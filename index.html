<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>♟ ChessClub — Plateforme Live</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
/* ═══════════════════════════ RESET & ROOT ═══════════════════════════ */
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0b0e14;
  --bg2:#0f1219;
  --glass:rgba(255,255,255,.04);
  --glass2:rgba(255,255,255,.07);
  --glass3:rgba(255,255,255,.11);
  --border:rgba(255,255,255,.08);
  --border2:rgba(255,255,255,.14);
  --gold:#C9922A;
  --gold2:#E8B84B;
  --gold3:#F5D98B;
  --gold-glow:rgba(201,146,42,.35);
  --beige:#E8DCC8;
  --text:#F0EDE8;
  --muted:#7A7E8A;
  --muted2:#4A4E5A;
  --green:#3DDC84;
  --red:#FF5C5C;
  --blue:#4A9EFF;
  --r:14px;
}
html{scroll-behavior:smooth}
body{
  background:var(--bg);color:var(--text);
  font-family:'Syne',sans-serif;
  min-height:100vh;overflow-x:hidden;
}
/* animated bg */
body::before{
  content:'';position:fixed;inset:0;z-index:0;
  background:
    radial-gradient(ellipse 70% 50% at 15% 20%,rgba(201,146,42,.07) 0%,transparent 60%),
    radial-gradient(ellipse 60% 40% at 85% 80%,rgba(74,158,255,.05) 0%,transparent 60%),
    radial-gradient(ellipse 40% 60% at 50% 50%,rgba(255,255,255,.015) 0%,transparent 70%);
  pointer-events:none;
}
/* chess grid texture */
body::after{
  content:'';position:fixed;inset:0;z-index:0;
  background-image:
    linear-gradient(rgba(255,255,255,.012) 1px,transparent 1px),
    linear-gradient(90deg,rgba(255,255,255,.012) 1px,transparent 1px);
  background-size:40px 40px;
  pointer-events:none;
}
.z1{position:relative;z-index:1}

/* ═══════════════════════════ GLASS ═══════════════════════════ */
.glass{
  background:var(--glass);
  backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
  border:1px solid var(--border);
  border-radius:var(--r);
}
.glass2{
  background:var(--glass2);
  backdrop-filter:blur(16px);
  -webkit-backdrop-filter:blur(16px);
  border:1px solid var(--border2);
  border-radius:var(--r);
}
.glass-gold{
  background:linear-gradient(135deg,rgba(201,146,42,.15),rgba(201,146,42,.05));
  backdrop-filter:blur(20px);
  border:1px solid rgba(201,146,42,.3);
  border-radius:var(--r);
  box-shadow:0 0 30px var(--gold-glow),inset 0 1px 0 rgba(255,255,255,.1);
}

/* ═══════════════════════════ HEADER ═══════════════════════════ */
header{
  position:sticky;top:0;z-index:100;
  background:rgba(11,14,20,.85);
  backdrop-filter:blur(24px);
  border-bottom:1px solid var(--border);
  padding:.8rem 1.2rem;
}
.header-inner{max-width:1100px;margin:0 auto;display:flex;align-items:center;gap:1rem}
.logo{display:flex;align-items:center;gap:.7rem}
.logo-icon{
  width:38px;height:38px;border-radius:10px;
  background:linear-gradient(135deg,var(--gold),var(--gold2));
  display:flex;align-items:center;justify-content:center;
  font-size:1.2rem;box-shadow:0 4px 16px var(--gold-glow);
}
.logo-name{font-size:1rem;font-weight:800;letter-spacing:-.01em;
  background:linear-gradient(90deg,var(--gold2),var(--beige));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent}
.logo-sub{font-size:.65rem;color:var(--muted);letter-spacing:.08em;text-transform:uppercase;margin-top:1px}

/* ═══════════════════════════ NAV TABS ═══════════════════════════ */
.nav{display:flex;gap:.3rem;margin-left:auto;background:var(--glass);padding:.3rem;border-radius:10px;border:1px solid var(--border)}
.nav-btn{
  font-family:'Syne',sans-serif;font-size:.78rem;font-weight:700;
  padding:.42rem 1rem;border-radius:7px;border:none;cursor:pointer;
  background:transparent;color:var(--muted);transition:all .2s;
  letter-spacing:.02em;
}
.nav-btn.active{
  background:linear-gradient(135deg,rgba(201,146,42,.25),rgba(201,146,42,.12));
  color:var(--gold2);border:1px solid rgba(201,146,42,.3);
  box-shadow:0 2px 12px rgba(201,146,42,.2);
}
.nav-btn:hover:not(.active){background:var(--glass2);color:var(--text)}

.header-right{display:flex;align-items:center;gap:.6rem;margin-left:.8rem}
.btn{
  display:inline-flex;align-items:center;gap:.4rem;
  font-family:'Syne',sans-serif;font-size:.75rem;font-weight:700;
  padding:.4rem .9rem;border-radius:8px;border:none;cursor:pointer;
  transition:all .2s;letter-spacing:.03em;white-space:nowrap;
}
.btn-ghost{background:var(--glass2);color:var(--muted);border:1px solid var(--border)}
.btn-ghost:hover{border-color:var(--gold);color:var(--gold)}
.btn-gold{
  background:linear-gradient(135deg,var(--gold),var(--gold2));
  color:#0b0e14;box-shadow:0 4px 16px var(--gold-glow);
}
.btn-gold:hover{transform:translateY(-1px);box-shadow:0 6px 24px rgba(201,146,42,.5)}
.live-pill{
  display:flex;align-items:center;gap:.4rem;
  font-size:.68rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase;
  color:var(--green);background:rgba(61,220,132,.1);
  border:1px solid rgba(61,220,132,.25);border-radius:999px;padding:.25rem .7rem;
}
.live-pill::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--green);box-shadow:0 0 8px var(--green);animation:glow 1.8s infinite}
@keyframes glow{0%,100%{opacity:1}50%{opacity:.4}}

/* ═══════════════════════════ PAGES ═══════════════════════════ */
.page{display:none}.page.active{display:block}
.main{max-width:1100px;margin:0 auto;padding:1.5rem 1.2rem}

/* ═══════════════════════════ SECTION LABEL ═══════════════════════════ */
.sec-label{
  font-size:.65rem;font-weight:700;letter-spacing:.14em;text-transform:uppercase;
  color:var(--muted);display:flex;align-items:center;gap:.6rem;margin-bottom:1rem;
}
.sec-label::after{content:'';flex:1;height:1px;background:var(--border)}

/* ═══════════════════════════ PODIUM ═══════════════════════════ */
.podium-row{display:grid;grid-template-columns:1fr 1.15fr 1fr;gap:1rem;margin-bottom:1.5rem}
@media(max-width:600px){.podium-row{grid-template-columns:1fr;gap:.7rem}}
.podium-card{
  display:flex;flex-direction:column;align-items:center;
  padding:1.5rem 1rem 1.2rem;text-align:center;
  position:relative;overflow:hidden;cursor:pointer;
  transition:transform .2s,box-shadow .2s;
}
.podium-card:hover{transform:translateY(-4px)}
.podium-card::before{
  content:'';position:absolute;inset:0;border-radius:var(--r);
  background:linear-gradient(160deg,rgba(255,255,255,.06),rgba(255,255,255,.01));
  pointer-events:none;
}
.podium-1{
  background:linear-gradient(160deg,rgba(201,146,42,.2),rgba(201,146,42,.05));
  border:1px solid rgba(201,146,42,.35);
  box-shadow:0 8px 40px rgba(201,146,42,.2),inset 0 1px 0 rgba(255,255,255,.1);
}
.podium-2{background:rgba(160,168,180,.08);border:1px solid rgba(160,168,180,.2)}
.podium-3{background:rgba(180,110,50,.08);border:1px solid rgba(180,110,50,.2)}
.p-crown{font-size:1.4rem;margin-bottom:.3rem;animation:float 3s ease-in-out infinite}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
.p-avatar{
  width:64px;height:64px;border-radius:50%;object-fit:cover;
  border:2.5px solid rgba(201,146,42,.5);margin-bottom:.7rem;
  box-shadow:0 0 24px rgba(201,146,42,.3);background:var(--glass2);
}
.p-rank-badge{
  font-size:.65rem;font-weight:800;letter-spacing:.06em;
  padding:.2rem .6rem;border-radius:999px;margin-bottom:.5rem;
}
.p-rank-1{background:rgba(201,146,42,.2);color:var(--gold2);border:1px solid rgba(201,146,42,.4)}
.p-rank-2{background:rgba(160,168,180,.15);color:#B0B8C8;border:1px solid rgba(160,168,180,.3)}
.p-rank-3{background:rgba(180,110,50,.15);color:#C07840;border:1px solid rgba(180,110,50,.3)}
.p-name{font-size:.95rem;font-weight:800;margin-bottom:.15rem}
.p-elo{font-family:'DM Mono',monospace;font-size:1.3rem;font-weight:500;color:var(--gold2);margin:.3rem 0}
.p-games{font-size:.68rem;color:var(--muted)}

/* ═══════════════════════════ STAT CARDS ═══════════════════════════ */
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:.8rem;margin-bottom:1.5rem}
@media(max-width:700px){.stats-row{grid-template-columns:1fr 1fr;gap:.6rem}}
.stat-card{padding:1rem 1.1rem;transition:border-color .2s,transform .2s}
.stat-card:hover{border-color:rgba(201,146,42,.3);transform:translateY(-2px)}
.stat-lbl{font-size:.62rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:.4rem}
.stat-val{font-family:'DM Mono',monospace;font-size:1.8rem;font-weight:500;
  background:linear-gradient(90deg,var(--gold2),var(--beige));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;line-height:1}
.stat-sub{font-size:.68rem;color:var(--muted);margin-top:.25rem}

/* ═══════════════════════════ LEADERBOARD TABLE ═══════════════════════════ */
.table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
.rank-table{width:100%;border-collapse:separate;border-spacing:0 4px;min-width:520px}
.rank-table th{
  font-size:.6rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;
  color:var(--muted);padding:.5rem .9rem;text-align:left;cursor:pointer;
}
.rank-table th:hover{color:var(--gold)}
.rank-row{
  background:var(--glass);transition:background .15s,transform .15s;cursor:pointer;
}
.rank-row:hover{background:var(--glass2);transform:translateX(3px)}
.rank-row td{padding:.8rem .9rem;border-top:1px solid var(--border);border-bottom:1px solid var(--border)}
.rank-row td:first-child{border-left:1px solid var(--border);border-radius:var(--r) 0 0 var(--r);padding-left:1rem}
.rank-row td:last-child{border-right:1px solid var(--border);border-radius:0 var(--r) var(--r) 0}
.rank-row.top1 td{border-color:rgba(201,146,42,.25)}
.rank-row.top2 td{border-color:rgba(160,168,180,.15)}
.rank-row.top3 td{border-color:rgba(180,110,50,.15)}
.rank-num{font-family:'DM Mono',monospace;font-size:.88rem;font-weight:500;color:var(--muted)}
.rank-1{color:var(--gold2)}.rank-2{color:#A0A8B4}.rank-3{color:#C07840}
.player-cell{display:flex;align-items:center;gap:.7rem}
.player-cell img{width:36px;height:36px;border-radius:50%;object-fit:cover;border:1.5px solid var(--border2);flex-shrink:0;background:var(--glass2)}
.player-name{font-size:.85rem;font-weight:700}
.player-handle{font-size:.65rem;color:var(--muted);margin-top:1px}
.elo-num{font-family:'DM Mono',monospace;font-size:.9rem;font-weight:500}
.prog{font-size:.75rem;font-weight:700;padding:.15rem .45rem;border-radius:5px}
.prog-up{color:var(--green);background:rgba(61,220,132,.12)}
.prog-dn{color:var(--red);background:rgba(255,92,92,.12)}
.prog-eq{color:var(--muted);background:var(--glass)}
.badge{display:inline-flex;align-items:center;gap:.2rem;font-size:.6rem;font-weight:700;padding:.14rem .48rem;border-radius:999px}
.b-fire{background:rgba(255,120,0,.15);color:#FF8040;border:1px solid rgba(255,120,0,.2)}
.b-solid{background:rgba(74,158,255,.12);color:var(--blue);border:1px solid rgba(74,158,255,.2)}
.b-sleep{background:rgba(120,100,200,.12);color:#9080D0;border:1px solid rgba(120,100,200,.2)}
.b-leader{background:rgba(201,146,42,.15);color:var(--gold2);border:1px solid rgba(201,146,42,.3)}
.b-hunter{background:rgba(255,60,60,.12);color:#FF6060;border:1px solid rgba(255,60,60,.2)}
.online-dot{width:7px;height:7px;border-radius:50%;display:inline-block}
.dot-on{background:var(--green);box-shadow:0 0 6px var(--green)}
.dot-off{background:var(--muted2)}

/* ═══════════════════════════ TOURNAMENT PAGE ═══════════════════════════ */
.tourn-grid{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
@media(max-width:700px){.tourn-grid{grid-template-columns:1fr}}
.tourn-card{padding:1.4rem;cursor:pointer;transition:all .2s;position:relative;overflow:hidden}
.tourn-card::after{content:'';position:absolute;bottom:-20px;right:-20px;width:80px;height:80px;border-radius:50%;background:rgba(201,146,42,.06);pointer-events:none}
.tourn-card:hover{border-color:rgba(201,146,42,.3);transform:translateY(-2px);box-shadow:0 8px 30px rgba(201,146,42,.1)}
.tc-icon{font-size:2rem;margin-bottom:.7rem}
.tc-title{font-size:1rem;font-weight:800;margin-bottom:.3rem}
.tc-sub{font-size:.76rem;color:var(--muted);line-height:1.5}
.tc-status{font-size:.62rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:.18rem .55rem;border-radius:999px;display:inline-flex;align-items:center;gap:.3rem;margin-top:.7rem}
.st-live{background:rgba(61,220,132,.1);color:var(--green);border:1px solid rgba(61,220,132,.2)}
.st-done{background:rgba(122,126,138,.1);color:var(--muted);border:1px solid var(--border)}
.st-new{background:rgba(201,146,42,.1);color:var(--gold2);border:1px solid rgba(201,146,42,.2)}

/* BRACKET */
.bracket-wrap{overflow-x:auto;padding-bottom:.5rem}
.bracket{display:flex;gap:2.5rem;align-items:flex-start;min-width:max-content}
.bracket-round{display:flex;flex-direction:column;gap:.6rem}
.round-label{font-size:.6rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--gold);margin-bottom:.8rem;text-align:center}
.match-card{
  background:var(--glass);border:1px solid var(--border);border-radius:10px;
  padding:.7rem .9rem;min-width:180px;cursor:pointer;
  transition:border-color .2s,background .2s;position:relative;
}
.match-card:hover{border-color:rgba(201,146,42,.4);background:var(--glass2)}
.match-card.clickable::after{content:'✎';position:absolute;top:6px;right:8px;font-size:.65rem;color:var(--gold);opacity:.7}
.match-player{display:flex;align-items:center;gap:.5rem;padding:.28rem 0}
.match-player:first-of-type{border-bottom:1px solid var(--border)}
.match-avatar{width:24px;height:24px;border-radius:50%;object-fit:cover;border:1px solid var(--border2);flex-shrink:0;background:var(--glass2)}
.match-pname{font-size:.8rem;font-weight:700;flex:1}
.match-score{font-family:'DM Mono',monospace;font-size:.82rem;font-weight:500}
.score-win{color:var(--gold2)}.score-loss{color:var(--muted)}.score-tbd{color:var(--muted2)}
.match-player.winner .match-pname{color:var(--gold2)}
.match-player.winner{background:rgba(201,146,42,.05);border-radius:5px;padding-left:.3rem;margin:-2px}
.match-vs{font-size:.55rem;font-weight:700;color:var(--muted2);text-align:center;letter-spacing:.1em;padding:.1rem 0}

/* CONNECTOR lines between rounds */
.bracket-connector{display:flex;align-items:center}

/* ═══════════════════════════ COMPARE PAGE ═══════════════════════════ */
.vs-layout{display:grid;grid-template-columns:1fr auto 1fr;gap:1.5rem;align-items:start}
@media(max-width:700px){.vs-layout{grid-template-columns:1fr;gap:1rem}}
.vs-player-sel{padding:1.2rem}
.vs-divider{display:flex;align-items:center;justify-content:center;padding-top:3rem}
.vs-badge{
  font-size:1rem;font-weight:800;color:var(--gold2);
  background:linear-gradient(135deg,rgba(201,146,42,.2),rgba(201,146,42,.05));
  border:1px solid rgba(201,146,42,.3);border-radius:50%;
  width:44px;height:44px;display:flex;align-items:center;justify-content:center;
  box-shadow:0 0 20px var(--gold-glow);
}
.vs-stats-table{width:100%;border-collapse:collapse}
.vs-stats-table td{padding:.55rem .8rem;font-size:.82rem;border-bottom:1px solid var(--border)}
.vs-stats-table td:first-child,.vs-stats-table td:last-child{font-weight:700}
.vs-stats-table td:nth-child(2){text-align:center;color:var(--muted);font-size:.68rem;letter-spacing:.08em;text-transform:uppercase}
.vs-winner-cell{color:var(--gold2)}
.chart-box{padding:1.2rem;margin-top:1rem}
.chart-wrap{position:relative;height:220px}

/* ═══════════════════════════ MODALS ═══════════════════════════ */
.overlay{
  position:fixed;inset:0;z-index:400;
  background:rgba(0,0,0,.7);backdrop-filter:blur(8px);
  display:flex;align-items:flex-end;justify-content:center;
  opacity:0;pointer-events:none;transition:opacity .25s;
}
@media(min-width:560px){.overlay{align-items:center}}
.overlay.open{opacity:1;pointer-events:all}
.modal{
  background:rgba(15,18,25,.98);
  border:1px solid var(--border2);border-radius:20px 20px 0 0;
  padding:1.6rem 1.4rem 2.2rem;
  width:100%;max-width:540px;max-height:92vh;overflow-y:auto;
  transform:translateY(30px);transition:transform .3s;
}
@media(min-width:560px){.modal{border-radius:20px;transform:translateY(20px)}}
.overlay.open .modal{transform:translateY(0)}
.modal-title{font-size:1.1rem;font-weight:800;margin-bottom:1.2rem;display:flex;align-items:center;gap:.6rem}
.modal-title .mt-icon{font-size:1.3rem}
.close-x{margin-left:auto;background:var(--glass2);border:1px solid var(--border);border-radius:50%;width:30px;height:30px;cursor:pointer;font-size:.85rem;display:flex;align-items:center;justify-content:center;color:var(--muted);flex-shrink:0}
.close-x:hover{color:var(--text);border-color:var(--border2)}

/* FORM */
.field-lbl{font-size:.68rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);display:block;margin-bottom:.4rem;margin-top:.9rem}
input[type=text],input[type=password],input[type=number],textarea,select{
  width:100%;background:rgba(255,255,255,.05);
  border:1px solid var(--border2);border-radius:8px;
  color:var(--text);padding:.58rem .9rem;
  font-size:.85rem;font-family:'Syne',sans-serif;outline:none;
  transition:border-color .18s,box-shadow .18s;
}
input:focus,textarea:focus,select:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(201,146,42,.15)}
select option{background:#0f1219}

/* MODE SWITCH */
.mode-switch{display:flex;background:var(--glass);border:1px solid var(--border);border-radius:8px;padding:.25rem;gap:.25rem;margin-top:.4rem}
.mode-opt{flex:1;text-align:center;font-size:.78rem;font-weight:700;padding:.4rem;border-radius:6px;cursor:pointer;transition:all .18s;color:var(--muted)}
.mode-opt.active{background:linear-gradient(135deg,rgba(201,146,42,.3),rgba(201,146,42,.1));color:var(--gold2);border:1px solid rgba(201,146,42,.3)}

/* PLAYER GRID */
.player-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:.5rem;margin-top:.4rem;max-height:220px;overflow-y:auto;padding:.3rem}
.player-grid::-webkit-scrollbar{width:4px}
.player-grid::-webkit-scrollbar-track{background:transparent}
.player-grid::-webkit-scrollbar-thumb{background:var(--glass3);border-radius:2px}
.pg-item{
  display:flex;flex-direction:column;align-items:center;gap:.4rem;
  padding:.7rem .5rem;border-radius:10px;border:1.5px solid var(--border);
  cursor:pointer;transition:all .18s;background:var(--glass);text-align:center;
}
.pg-item:hover{border-color:rgba(201,146,42,.3);background:var(--glass2)}
.pg-item.selected{border-color:var(--gold2);background:rgba(201,146,42,.1);box-shadow:0 0 12px rgba(201,146,42,.15)}
.pg-item img{width:40px;height:40px;border-radius:50%;object-fit:cover;border:1.5px solid var(--border2);background:var(--glass2)}
.pg-name{font-size:.72rem;font-weight:700}
.pg-elo{font-family:'DM Mono',monospace;font-size:.65rem;color:var(--muted)}
.pg-check{font-size:.8rem;margin-top:.2rem;opacity:0}
.pg-item.selected .pg-check{opacity:1;color:var(--gold2)}

/* SCORE INPUT */
.score-row{display:flex;align-items:center;gap:.7rem;padding:.6rem;background:var(--glass);border:1px solid var(--border);border-radius:8px;margin-bottom:.4rem}
.score-row img{width:30px;height:30px;border-radius:50%;border:1px solid var(--border2);flex-shrink:0;background:var(--glass2)}
.score-row .sname{flex:1;font-size:.82rem;font-weight:700}
.score-btns{display:flex;gap:.3rem}
.sc-btn{font-size:.72rem;font-weight:700;padding:.28rem .6rem;border-radius:6px;border:1px solid var(--border2);background:var(--glass2);color:var(--muted);cursor:pointer;transition:all .15s;font-family:'Syne',sans-serif}
.sc-btn:hover{border-color:rgba(201,146,42,.4);color:var(--gold)}
.sc-btn.active-1{background:rgba(201,146,42,.2);border-color:var(--gold2);color:var(--gold2)}
.sc-btn.active-half{background:rgba(74,158,255,.15);border-color:var(--blue);color:var(--blue)}
.sc-btn.active-0{background:rgba(255,92,92,.12);border-color:var(--red);color:var(--red)}
